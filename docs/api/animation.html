<h3>
    animation
</h3>
<p>
    辅助开发动画控制：
</p>
<pre>
let { stop, pause, resume } = animation(deep => {
    // 轮询调用，必输
}, duration = 400, deep => {
    // 结束调用，可选
});
</pre>
<p>
    返回的值是一个对象，其中有三个属性：stop、pause 和 resume：
</p>
<h4>
    stop
</h4>
<p>
    一个函数，调用该函数，可以提前结束动画
</p>
<h4>
    pause
</h4>
<div class="version">
    始于 v2.0.0
</div>
<p>
    一个函数，调用该函数，可以暂停动画
</p>
<h4>
    resume
</h4>
<div class="version">
    始于 v2.0.0
</div>
<p>
    一个函数，调用该函数，可以继续动画启动暂停的动画
</p>
