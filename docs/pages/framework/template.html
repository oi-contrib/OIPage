<h2>
    事件（oi-on）
</h2>
<p>
    给一个原生绑定交互事件，比如点击：
</p>
<pre tag="html">
    <button oi-bind:click="doit">点击我</button>
</pre>
<p>
    其中doit就是
    <span class="warn">
        index.js
    </span>
    文件中定义的方法，而click表示是点击事件。
</p>
<h3>
    事件列表
</h3>
<p>

</p>
<table>

<h2>
    属性（oi-bind）
</h2>
<p>
    给标签绑定一个值：
</p>
<pre tag="html">
    <view oi-bind:active="isActive"></view>
</pre>
