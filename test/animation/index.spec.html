<!DOCTYPE html>
<html lang="zh-cn">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        .bar {
            width: 0;
            height: 30px;
            background-color: red;
            outline: 2px solid black;
        }
    </style>
</head>

<body>

    <div class="bar" id="bar-id"></div>

    <button onClick="stopAnimation()">停止</button>
    <button onClick="pauseAnimation()">暂停</button>
    <button onClick="resumeAnimation()">继续</button>

    <script type="module">
        import { animation } from "../../web/animation/index.js";

        let barEl = document.getElementById("bar-id");
        let { stop, pause, resume } = animation((deep) => {
            barEl.style.width = (500 * deep) + "px";
            console.log("轮询：deep=" + deep);
        }, 5000, (deep) => {
            console.log("结束：deep=" + deep);
        });

        window.stopAnimation = function () {
            stop();
        }

        window.pauseAnimation = function () {
            pause();
        }

        window.resumeAnimation = function () {
            resume();
        }

    </script>

</body>

</html>
